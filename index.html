<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GTTOOLS — 100+ Free Online Tools</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Simple SEO -->
  <meta name="description" content="GTTOOLS — 100+ free online tools for text, image, PDF, developer and utility tasks. Fast, clean and fully frontend." />
  <meta name="author" content="GTTOOLS" />

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="app">

    <!-- HEADER -->
    <header class="header">
      <div class="logo">⚙️ GTTOOLS</div>
      <div class="tagline">100+ Free Text • Image • PDF • Dev • Utility Tools</div>
    </header>

    <!-- LAYOUT -->
    <div class="layout">

      <!-- SIDEBAR -->
      <aside class="sidebar">
        <input
          type="text"
          id="searchBox"
          class="search-input"
          placeholder="Search tools..."
        />

        <div class="group-filters">
          <button class="group-btn active" data-group="all">All</button>
          <button class="group-btn" data-group="text">Text</button>
          <button class="group-btn" data-group="image">Image</button>
          <button class="group-btn" data-group="pdf">PDF</button>
          <button class="group-btn" data-group="dev">Dev</button>
          <button class="group-btn" data-group="util">Utility</button>
        </div>

        <ul id="toolList" class="tool-list"></ul>
      </aside>

      <!-- MAIN AREA -->
      <main class="main">
        <div id="toolDetails" class="tool-details">
          <h2>Welcome to GTTOOLS ⚙️</h2>
          <p>
            Left sidebar se koi bhi tool choose karo.<br><br>
            ✅ 100+ high-use tools (text, image, PDF, dev, utility)<br>
            ✅ Pure frontend UI (no login, no database)<br>
            ✅ Light, fast, mobile friendly
          </p>
        </div>
      </main>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
